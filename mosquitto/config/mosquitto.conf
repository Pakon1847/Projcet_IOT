# Mosquitto MQTT Broker — Dev config
# Port 1883: MQTT standard
listener 1883 0.0.0.0

# Port 9001: WebSocket (สำหรับ browser MQTT client / frontend)
listener 9001 0.0.0.0
protocol websockets

# Dev: allow anonymous (production ต้องเปิด password_file)
allow_anonymous true

persistence true
persistence_location /mosquitto/data/

log_dest stdout
log_type error warning notice information
